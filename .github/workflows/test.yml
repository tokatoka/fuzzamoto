name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: [self-hosted]
    strategy:
      matrix:
        include:
          - name: aflpp
            context: .
            file: ./Dockerfile
            tag: fuzzamoto:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image - ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false # build only - don't push to registry
          load: true
          tags: ${{ matrix.tag }}
          platforms: linux/amd64
      - name: Run checks
        run: |
          docker run --privileged fuzzamoto:ci /tests/ci/run-http-server.sh